<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#080810" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MyNotes" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <title>MyNotes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <header class="header">
    <div class="header-glass">
      <div class="header-top">
        <div class="header-left">
          <div class="date-label" id="dateLabel"></div>
          <div class="section-title">
            <span class="section-icon" id="sectionIcon"></span>
            <span id="sectionName"></span>
          </div>
        </div>
        <div class="header-right">
          <button class="cal-icon-btn" id="calIconBtn" title="Открыть календарь">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="3"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </button>
          <div class="progress-wrap">
            <svg class="progress-svg" viewBox="0 0 46 46">
              <circle class="progress-bg" cx="23" cy="23" r="19"/>
              <circle class="progress-ring" id="progressRing" cx="23" cy="23" r="19"/>
            </svg>
            <span class="progress-pct" id="progressPct">0%</span>
          </div>
        </div>
      </div>

      <div class="date-nav" id="dateNav">
        <div class="cal-month" id="calMonth"></div>
        <div class="date-nav-row">
          <button class="date-nav-arrow" id="datePrev">‹</button>
          <div class="date-nav-days" id="dateNavDays"></div>
          <button class="date-nav-arrow" id="dateNext">›</button>
        </div>
      </div>

      <div class="workout-nav" id="workoutNav">
        <button class="wk-nav-btn" id="wkPrev">‹ Пред.</button>
        <span class="wk-date-label" id="wkDateLabel"></span>
        <button class="wk-nav-btn" id="wkNext">След. ›</button>
      </div>

      <div class="workout-copy-bar" id="workoutCopyBar">
        <span class="wk-copy-hint">Скопировать тренировку →</span>
        <button class="wk-copy-btn" id="wkCopyPick">📅 Выбрать дату</button>
      </div>
    </div>
  </header>

  <div class="stats-bar">
    <span class="stat"><span class="dot dot-active">●</span> <span id="statActive">0</span> активных</span>
    <span class="stat-div"></span>
    <span class="stat"><span class="dot dot-done">●</span> <span id="statDone">0</span> выполнено</span>
    <button class="clear-btn" id="clearDoneBtn">очистить ✕</button>
  </div>

  <div class="list" id="itemList"></div>

  <div class="input-row">
    <input class="main-input" id="mainInput" placeholder="Добавить..." />
    <button class="add-btn" id="addBtn">+</button>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item" data-tab="tasks">
      <span class="nav-icon">✦</span>
      <span class="nav-label">Задачи</span>
      <span class="nav-badge" id="badge-tasks"></span>
    </button>
    <button class="nav-item" data-tab="workout">
      <span class="nav-icon">◈</span>
      <span class="nav-label">Тренировка</span>
      <span class="nav-badge" id="badge-workout"></span>
    </button>
    <button class="nav-item" data-tab="homework">
      <span class="nav-icon">◆</span>
      <span class="nav-label">Домашка</span>
      <span class="nav-badge" id="badge-homework"></span>
    </button>
    <button class="nav-item" data-tab="notes">
      <span class="nav-icon">◇</span>
      <span class="nav-label">Заметки</span>
      <span class="nav-badge" id="badge-notes"></span>
    </button>
  </nav>
</div>

<div class="modal-overlay" id="calModal">
  <div class="modal-glass">
    <div class="modal-header">
      <button class="modal-month-nav" id="modalPrevMonth">‹</button>
      <span class="modal-month-title" id="modalMonthTitle"></span>
      <button class="modal-month-nav" id="modalNextMonth">›</button>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-weekdays">
      <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
    </div>
    <div class="modal-days" id="modalDays"></div>
    <button class="modal-today-btn" id="modalTodayBtn">Сегодня</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="wk-pick-modal" id="wkPickModal">
  <div class="wk-pick-inner">
    <div class="wk-pick-title">Скопировать тренировку на дату</div>
    <div class="wk-pick-nav">
      <button id="wkPickPrev">‹</button>
      <span class="wk-pick-month" id="wkPickMonth"></span>
      <button id="wkPickNext">›</button>
    </div>
    <div class="wk-pick-wds"><span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span></div>
    <div class="wk-pick-days" id="wkPickDays"></div>
    <button class="wk-pick-cancel" id="wkPickCancel">Отмена</button>
  </div>
  <div class="modal-days" id="modalDays"></div>
    <button class="modal-today-btn" id="modalTodayBtn">Сегодня</button> </div>
</div>
</div>

<script src="app.js"></script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
